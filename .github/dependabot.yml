# `dependabot.yml` configuration for the Iscreami project
version: 2
updates:
# Frontend dependencies (pnpm)
- package-ecosystem: npm
  directory: /frontend
  schedule:
    interval: weekly
    day: monday
    time: "04:00"
  open-pull-requests-limit: 10
  pull-request-branch-name:
    separator: "/"
  commit-message:
    prefix: "chore(deps)"
    include: "scope"
  target-branch: main
  rebase-strategy: auto
  labels:
  - dependencies
  - frontend
  cooldown:
    default-days: 7
# Backend Python dependencies
- package-ecosystem: pip
  directory: /backend
  schedule:
    interval: weekly
    day: monday
    time: "04:00"
  open-pull-requests-limit: 10
  pull-request-branch-name:
    separator: "/"
  commit-message:
    prefix: "chore(deps)"
    include: "scope"
  target-branch: main
  rebase-strategy: auto
  labels:
  - dependencies
  - backend
  cooldown:
    default-days: 7
# GitHub Actions
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: "04:00"
  open-pull-requests-limit: 5
  pull-request-branch-name:
    separator: "/"
  commit-message:
    prefix: "ci"
    include: "scope"
  target-branch: main
  rebase-strategy: auto
  labels:
  - ci
  cooldown:
    default-days: 7
# Dockerfile
- package-ecosystem: docker
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: "04:00"
  open-pull-requests-limit: 5
  pull-request-branch-name:
    separator: "/"
  commit-message:
    prefix: "chore(deps)"
    include: "scope"
  target-branch: main
  rebase-strategy: auto
  labels:
  - dependencies
  - docker
  cooldown:
    default-days: 7